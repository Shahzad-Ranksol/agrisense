version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    networks:
      - agri-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro   # SSL certs from host
    depends_on:
      - backend
    networks:
      - agri-net

networks:
  agri-net:
    driver: bridge
