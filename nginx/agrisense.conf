# HTTP → HTTPS redirect
server {
    listen 80;
    server_name nimbleleads.co www.nimbleleads.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nimbleleads.co www.nimbleleads.co;

    ssl_certificate     /etc/letsencrypt/live/nimbleleads.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nimbleleads.co/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # React static files
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # FastAPI — SSE needs buffering OFF
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Connection "";   # keep-alive for SSE
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;            # long enough for Claude stream
        chunked_transfer_encoding on;
    }
}
